<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Data Viz</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <nav class="glass-panel">
                <div class="logo">DataVue</div>
                <div class="nav-links">
                    <a href="#hero">Home</a>
                    <a href="#visualizations">Visualizations</a>
                    <a href="#about">About</a>
                </div>
            </nav>
        </header>

        <main>
            <section id="hero" class="hero-section">
                <div class="hero-content">
                    <h1 class="hero-title">Visualize <span class="gradient-text">Everything</span></h1>
                    <p class="hero-subtitle">Interactive data storytelling with D3.js and GSAP.</p>
                    <button class="cta-button">Explore Data</button>
                    <div class="scroll-indicator">
                        <div class="mouse">
                            <div class="wheel"></div>
                        </div>
                    </div>
                </div>
                <!-- Background animation elements will be injected here -->
                <div class="bg-elements"></div>
            </section>

            <section id="visualizations" class="viz-section">
                <div class="container">
                    <h2 class="section-title">Global Trends</h2>

                    <!-- Chart 1 -->
                    <div class="viz-card glass-panel" style="margin-bottom: var(--spacing-lg);">
                        <div class="viz-header">
                            <h3>Data Interaction</h3>
                            <div class="viz-controls">
                                <button class="viz-btn active" data-view="scatter">Scatter</button>
                                <button class="viz-btn" data-view="bar">Bar</button>
                            </div>
                        </div>
                        <div id="chart-container"></div>
                        <div class="viz-tooltip hidden"></div>
                    </div>

                    <!-- Chart 2: Consumption Trends -->
                    <div class="viz-card glass-panel">
                        <div class="viz-header">
                            <h3>Alcohol vs. Cannabis (2015-2024)</h3>
                        </div>
                        <div id="comparison-container" style="height: 500px; width: 100%; position: relative;"></div>
                        <div class="comparison-tooltip hidden"></div>
                    </div>

                    <!-- Chart 3: Expansion Map -->
                    <div class="viz-card glass-panel">
                        <div class="viz-header">
                            <h3>Market Expansion (2022-2028)</h3>
                            <div id="year-display"
                                style="font-size: 1.5rem; font-weight: bold; color: var(--color-primary);">2022</div>
                        </div>
                        <div id="map-container" style="height: 600px; width: 100%; position: relative;"></div>
                        <div class="map-tooltip hidden"></div>
                    </div>

                    <!-- Revenue Growth Chart -->
                    <div class="viz-card glass-panel" style="margin-top: 2rem;">
                        <div class="viz-header">
                            <h2 class="gradient-text" style="font-size: 1.5rem;">Revenue Growth (2020-2026)</h2>
                        </div>
                        <div id="revenue-container" style="width: 100%; height: 500px; position: relative;"></div>
                        <div class="revenue-tooltip viz-tooltip hidden"></div>
                    </div>

                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 DataVue Experiment.</p>
        </footer>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/ScrollTrigger.min.js"></script>

    <!-- App Scripts -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
